// ===== UTILS =====
const fmt=n=>{if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return ''+n};
const topicClr={'xác thực SIM':'#1d4ed8','gói cước':'#059669','World Cup':'#d97706','minigame':'#7c3aed','cộng đồng':'#0891b2','internet':'#0ea5e9','cảnh báo':'#dc2626','phong thủy':'#db2777','roaming':'#06b6d4','khuyến mãi':'#f59e0b','chuyển mạng':'#8b5cf6','nội bộ':'#64748b','sim số đẹp':'#ec4899','thông báo':'#6b7280','khác':'#94a3b8'};
const tc=t=>topicClr[t]||'#94a3b8';

function cutDate(days){const d=new Date();d.setDate(d.getDate()-days);return d.toISOString().slice(0,10);}
function filterD(arr,days,f='date'){const cut=cutDate(days);return arr.filter(x=>(x[f]||x.date||x.created||'')>=cut);}
function sum(arr,k){return arr.reduce((s,x)=>s+(x[k]||0),0);}
function topicMap(arr){const m={};arr.forEach(x=>{m[x.topic]=(m[x.topic]||0)+1;});return m;}

let charts=[];
function destroyAll(){charts.forEach(c=>{try{c.destroy();}catch(e){}});charts=[];}
function mkChart(id,cfg){const c=new Chart(document.getElementById(id),cfg);charts.push(c);return c;}

    mkChart('c_topic',{type:'doughnut',data:{labels:Object.keys(tpMap),datasets:[{data:Object.values(tpMap),backgroundColor:Object.keys(tpMap).map(t=>tc(t)),borderWidth:2,borderColor:'white'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:10}}}}});
    mkChart('c_dow',{type:'bar',data:{labels:dowLbl,datasets:[{label:'Avg Engagement',data:dowAvg,backgroundColor:dowAvg.map(v=>v>avgE?'#1d4ed8':'#bfdbfe')}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>fmt(v)}}}}});
    mkChart('c_daily_eng',{type:'line',data:{labels:engDates.map(d=>d.slice(5)),datasets:[{label:'Engagement',data:engVals,borderColor:'#1d4ed8',backgroundColor:'rgba(29,78,216,.08)',tension:.35,fill:true,pointRadius:engDates.length>20?2:4,pointHoverRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{title:([i])=>engDates[i.dataIndex]||'',label:c=>'Engagement: '+fmt(c.raw)}}},scales:{x:{ticks:{maxRotation:45,font:{size:9},maxTicksLimit:20}},y:{beginAtZero:true,ticks:{callback:v=>fmt(v)}}}}});
    mkChart('c_post_bar',{type:'bar',indexAxis:'y',data:{labels:topPostBar.map(p=>(p.msg||'(no text)').slice(0,45)+(p.msg&&p.msg.length>45?'…':'')),datasets:[{label:'Engagement',data:topPostBar.map(p=>p.engagement),backgroundColor:topPostBar.map(p=>tc(p.topic)+'cc'),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'⚡ '+fmt(c.raw)+' | '+topPostBar[c.dataIndex].date}}},scales:{x:{beginAtZero:true,ticks:{callback:v=>fmt(v)}},y:{ticks:{font:{size:10}}}}}});
  });
}

// ===== MAIN =====
function render(){
  destroyAll();
  const ch=document.getElementById('chSel').value;
  const days=parseInt(document.getElementById('dSel').value);
  if(ch==='tiktok') renderTK(days);
  else if(ch==='fb_tphcm') renderFB(FB_TPHCM,'Fanpage MobiFone TP. Hồ Chí Minh',4264,days);
  else renderFB(FB_SAIGON,'MobiFone Saigon',173792,days);
}
document.getElementById('chSel').addEventListener('change',render);
document.getElementById('dSel').addEventListener('change',render);
render();
</script>
